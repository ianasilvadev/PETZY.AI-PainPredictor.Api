<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />
    <title>Petzy — Análise de Dor em Animais</title>
    <style>
      :root {
        --bg-app: #0f0d1a;
        --bg-panel: #16122b;
        --bg-card: #1e1938;
        --bg-input: #0f0d1a;
        --accent-purple: #7c5cbf;
        --accent-purple-light: #a47de8;
        --accent-orange: #f97316;
        --accent-orange-light: #fdba74;
        --border: rgba(124, 92, 191, 0.25);
        --border-strong: rgba(124, 92, 191, 0.5);
        --text-primary: #ede9fe;
        --text-secondary: #9d94b8;
        --text-muted: #5b5278;
        --status-normal: #22c55e;
        --status-warn: #eab308;
        --status-crit: #ef4444;
        --radius-sm: 10px;
        --radius-md: 16px;
        --radius-lg: 24px;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "Segoe UI", system-ui, sans-serif;
        background: var(--bg-app);
        color: var(--text-primary);
        min-height: 100vh;
        padding: 24px;
      }

      .app-header {
        display: flex;
        align-items: center;
        gap: 14px;
        margin-bottom: 28px;
      }
      .app-logo {
        width: 42px;
        height: 42px;
        background: linear-gradient(135deg, #7c5cbf 0%, #f97316 100%);
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 22px;
        line-height: 1;
      }
      .app-title {
        font-size: 22px;
        font-weight: 700;
        letter-spacing: -0.3px;
      }
      .app-subtitle {
        font-size: 13px;
        color: var(--text-muted);
        margin-top: 1px;
      }
      .app-badge {
        margin-left: auto;
        background: rgba(124, 92, 191, 0.18);
        border: 1px solid var(--border);
        color: var(--accent-purple-light);
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.08em;
        padding: 4px 10px;
        border-radius: 20px;
        text-transform: uppercase;
      }

      .container {
        max-width: 1320px;
        margin: 0 auto;
        display: grid;
        grid-template-columns: 1fr 340px;
        gap: 20px;
      }
      @media (max-width: 900px) {
        .container {
          grid-template-columns: 1fr;
        }
      }

      .panel {
        background: var(--bg-panel);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        padding: 22px;
      }
      .panel-title {
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 0.07em;
        text-transform: uppercase;
        color: var(--text-muted);
        margin-bottom: 16px;
      }

      .video-wrapper {
        position: relative;
        background: #080611;
        border-radius: var(--radius-md);
        border: 1px solid var(--border);
        overflow: hidden;
        width: 100%;
        height: 420px;
      }
      .video-wrapper video,
      .video-wrapper canvas {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: contain;
        border-radius: 0;
        display: block;
      }
      .video-wrapper canvas {
        pointer-events: none;
      }

      .video-idle {
        position: absolute;
        inset: 0;
        z-index: 10;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 10px;
        color: var(--text-muted);
        font-size: 14px;
        pointer-events: none;
        transition: opacity 0.3s;
        background: #080611;
      }
      .video-idle.hidden {
        opacity: 0;
        pointer-events: none;
        visibility: hidden;
      }

      .controls {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 14px;
      }

      button,
      .file-label {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        padding: 9px 18px;
        border-radius: 40px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        border: none;
        transition:
          opacity 0.15s,
          transform 0.12s;
        white-space: nowrap;
      }
      button:active,
      .file-label:active {
        transform: scale(0.97);
      }

      .btn-primary {
        background: linear-gradient(135deg, #7c5cbf, #a47de8);
        color: #fff;
      }
      .btn-orange {
        background: linear-gradient(135deg, #c2540a, #f97316);
        color: #fff;
      }
      .btn-ghost {
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid var(--border);
        color: var(--text-secondary);
      }
      .btn-danger {
        background: rgba(239, 68, 68, 0.15);
        border: 1px solid rgba(239, 68, 68, 0.35);
        color: #f87171;
      }
      .btn-icon {
        width: 16px;
        height: 16px;
        flex-shrink: 0;
      }

      input[type="file"] {
        display: none;
      }

      .status-bar {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-top: 14px;
        padding: 9px 14px;
        background: var(--bg-card);
        border-radius: var(--radius-sm);
        border: 1px solid var(--border);
        font-size: 12px;
        color: var(--text-secondary);
      }
      .status-dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--text-muted);
        flex-shrink: 0;
        transition: background 0.3s;
      }
      .status-dot.active {
        background: var(--status-normal);
        box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.2);
      }
      .status-dot.loading {
        background: var(--accent-orange);
        animation: pulse 1s ease infinite;
      }
      .status-dot.error {
        background: var(--status-crit);
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.4;
        }
      }

      .analysis-panel {
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      .risk-card {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: var(--radius-md);
        padding: 18px;
      }
      .risk-card-label {
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.07em;
        color: var(--text-muted);
        margin-bottom: 10px;
      }
      .risk-empty {
        font-size: 13px;
        color: var(--text-muted);
        padding: 10px 0;
      }

      .risk-species {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 14px;
      }
      .species-icon {
        width: 36px;
        height: 36px;
        background: rgba(124, 92, 191, 0.18);
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
      }
      .species-name {
        font-size: 15px;
        font-weight: 600;
      }
      .species-sub {
        font-size: 12px;
        color: var(--text-muted);
        margin-top: 1px;
      }

      .score-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 6px;
      }
      .score-label {
        font-size: 12px;
        color: var(--text-secondary);
      }
      .score-value {
        font-size: 20px;
        font-weight: 700;
      }
      .score-bar-track {
        width: 100%;
        height: 6px;
        background: rgba(255, 255, 255, 0.07);
        border-radius: 99px;
        overflow: hidden;
        margin-bottom: 14px;
      }
      .score-bar-fill {
        height: 100%;
        border-radius: 99px;
        transition:
          width 0.5s ease,
          background 0.5s ease;
      }

      .risk-badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 6px 14px;
        border-radius: 40px;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.04em;
      }
      .risk-badge.normal {
        background: rgba(34, 197, 94, 0.15);
        color: #4ade80;
        border: 1px solid rgba(34, 197, 94, 0.3);
      }
      .risk-badge.atencao {
        background: rgba(234, 179, 8, 0.15);
        color: #fde047;
        border: 1px solid rgba(234, 179, 8, 0.3);
      }
      .risk-badge.critico {
        background: rgba(239, 68, 68, 0.15);
        color: #f87171;
        border: 1px solid rgba(239, 68, 68, 0.3);
      }

      .meta-row {
        margin-top: 12px;
        font-size: 11px;
        color: var(--text-muted);
        border-top: 1px solid rgba(255, 255, 255, 0.05);
        padding-top: 10px;
      }

      .settings-card {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: var(--radius-md);
        padding: 16px;
      }
      .setting-row {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 10px;
      }
      .setting-row:last-child {
        margin-bottom: 0;
      }
      .setting-label {
        font-size: 12px;
        color: var(--text-secondary);
        flex: 1;
      }
      .setting-input {
        width: 88px;
        background: var(--bg-input);
        border: 1px solid var(--border);
        border-radius: 8px;
        color: var(--text-primary);
        font-size: 13px;
        padding: 6px 10px;
        text-align: right;
      }
      .setting-input:focus {
        outline: none;
        border-color: var(--border-strong);
      }

      .endpoint-badge {
        font-size: 10px;
        font-family: "Courier New", monospace;
        color: var(--text-muted);
        background: rgba(0, 0, 0, 0.3);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 5px 9px;
        word-break: break-all;
      }

      .action-row {
        display: flex;
        gap: 10px;
      }
      .action-row button {
        flex: 1;
        justify-content: center;
      }
    </style>
  </head>
  <body>
    <div class="app-header">
      <div class="app-logo">
        <svg
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="none"
          stroke="#fff"
          stroke-width="1.8"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <ellipse cx="6" cy="7" rx="1.8" ry="2.5" />
          <ellipse cx="10.5" cy="4.5" rx="1.5" ry="2.2" />
          <ellipse cx="15" cy="4.5" rx="1.5" ry="2.2" />
          <ellipse cx="19" cy="7" rx="1.8" ry="2.5" />
          <path
            d="M12 10c-4 0-7 2.5-6 6.5.5 2 2 3.5 4 3.5h4c2 0 3.5-1.5 4-3.5 1-4-2-6.5-6-6.5z"
          />
        </svg>
      </div>
      <div>
        <div class="app-title">Petzy</div>
        <div class="app-subtitle">Análise de dor em animais</div>
      </div>
      <div class="app-badge">petzy AI</div>
    </div>

    <div class="container">
      <div class="panel">
        <div class="panel-title">Monitoramento ao vivo</div>

        <div class="video-wrapper" id="videoWrapper">
          <video id="video" autoplay playsinline muted></video>
          <canvas id="overlayCanvas"></canvas>
          <div class="video-idle" id="videoIdle">
            <svg
              width="48"
              height="48"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.2"
            >
              <rect x="2" y="7" width="20" height="12" rx="2" />
              <path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2" />
              <circle cx="12" cy="13" r="3" />
            </svg>
            Aguardando câmera ou vídeo...
          </div>
        </div>

        <div class="controls">
          <button class="btn-primary" id="startCameraBtn">
            <svg
              class="btn-icon"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path
                d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"
              />
              <circle cx="12" cy="13" r="4" />
            </svg>
            Iniciar câmera
          </button>
          <label class="file-label btn-ghost" for="videoUpload">
            <svg
              class="btn-icon"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path
                d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"
              />
            </svg>
            Carregar vídeo
          </label>
          <input
            type="file"
            id="videoUpload"
            accept="video/mp4,video/webm,video/ogg"
          />
          <button class="btn-danger" id="stopBtn">
            <svg class="btn-icon" viewBox="0 0 24 24" fill="currentColor">
              <rect x="4" y="4" width="16" height="16" rx="2" />
            </svg>
            Parar
          </button>
        </div>

        <div class="status-bar">
          <div class="status-dot" id="statusDot"></div>
          <span id="statusMsg">Aguardando início...</span>
        </div>
      </div>

      <div class="analysis-panel">
        <div class="action-row">
          <button class="btn-ghost" id="toggleAutoBtn">
            <svg
              class="btn-icon"
              id="toggleIcon"
              viewBox="0 0 24 24"
              fill="currentColor"
            >
              <rect x="6" y="4" width="4" height="16" rx="1" />
              <rect x="14" y="4" width="4" height="16" rx="1" />
            </svg>
            <span id="toggleLabel">Pausar análise</span>
          </button>
          <button class="btn-orange" id="captureNowBtn">
            <svg
              class="btn-icon"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <circle cx="12" cy="12" r="3" />
              <path
                d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"
              />
            </svg>
            Capturar
          </button>
        </div>

        <div class="risk-card" id="analysisResult">
          <div class="risk-card-label">Última detecção</div>
          <div class="risk-empty">Nenhuma análise ainda.</div>
        </div>

        <div class="settings-card">
          <div class="panel-title" style="margin-bottom: 12px">
            Configurações
          </div>

          <div class="setting-row">
            <span class="setting-label">Intervalo de captura</span>
            <input
              type="number"
              id="intervalInput"
              class="setting-input"
              value="1000"
              step="100"
            />
            <span style="font-size: 11px; color: var(--text-muted)">ms</span>
          </div>

          <div
            class="setting-row"
            style="flex-direction: column; align-items: flex-start; gap: 6px"
          >
            <span class="setting-label">Endpoint (backend)</span>
            <div class="endpoint-badge">http://localhost:8000/analyze-frame</div>
          </div>
        </div>
      </div>
    </div>

    <script>
      // ---------- CONFIGURAÇÕES (comunicam apenas com o backend real) ----------
      const BACKEND_URL = "http://localhost:8000/analyze-frame";
      const MOTION_THRESHOLD = 25;
      const MOTION_PIXEL_RATIO = 0.02;
      const DEFAULT_CAPTURE_INTERVAL = 1000;
      const MAX_WIDTH = 640;

      // ---------- ELEMENTOS DOM ----------
      const videoElement = document.getElementById("video");
      const overlayCanvas = document.getElementById("overlayCanvas");
      const videoIdleDiv = document.getElementById("videoIdle");
      const statusDot = document.getElementById("statusDot");
      const statusMsgSpan = document.getElementById("statusMsg");
      const analysisDiv = document.getElementById("analysisResult");
      const startCameraBtn = document.getElementById("startCameraBtn");
      const stopBtn = document.getElementById("stopBtn");
      const videoUpload = document.getElementById("videoUpload");
      const toggleAutoBtn = document.getElementById("toggleAutoBtn");
      const toggleLabel = document.getElementById("toggleLabel");
      const captureNowBtn = document.getElementById("captureNowBtn");
      const intervalInput = document.getElementById("intervalInput");

      // ---------- ESTADO GLOBAL ----------
      let mediaStream = null;
      let currentVideoSrc = null;
      let autoAnalysisActive = true;
      let captureIntervalId = null;
      let lastSentTimestamp = 0;
      let lastFrameData = null;
      let isSendingFrame = false;
      let motionCanvas = document.createElement("canvas");
      let motionCtx = motionCanvas.getContext("2d", {
        willReadFrequently: true,
      });
      let currentVideoDimensions = { width: 0, height: 0 };
      let activeVideoSource = false;
      let lastSentFrameSize = { width: 0, height: 0 }; // dimensões do último frame enviado

      // ---------- FUNÇÕES AUXILIARES UI ----------
      function updateStatus(message, state = "idle") {
        statusMsgSpan.innerText = message;
        statusDot.className = "status-dot";
        if (state === "active") statusDot.classList.add("active");
        else if (state === "loading") statusDot.classList.add("loading");
        else if (state === "error") statusDot.classList.add("error");
      }

      function showIdleOverlay(show) {
        videoIdleDiv.classList.toggle("hidden", !show);
      }

      function resetMotionBuffer() {
        lastFrameData = null;
      }

      function syncOverlaySize() {
        if (!videoElement.videoWidth || !videoElement.videoHeight) return;
        overlayCanvas.width = videoElement.clientWidth;
        overlayCanvas.height = videoElement.clientHeight;
        overlayCanvas.style.width = `${videoElement.clientWidth}px`;
        overlayCanvas.style.height = `${videoElement.clientHeight}px`;

        const displayWidth = videoElement.clientWidth;
        const displayHeight = videoElement.clientHeight;
        const videoRawW = videoElement.videoWidth;
        const videoRawH = videoElement.videoHeight;
        if (videoRawW && videoRawH) {
          const scale = Math.min(
            displayWidth / videoRawW,
            displayHeight / videoRawH,
          );
          const drawW = videoRawW * scale;
          const drawH = videoRawH * scale;
          const offsetX = (displayWidth - drawW) / 2;
          const offsetY = (displayHeight - drawH) / 2;
          currentVideoDimensions = {
            offsetX,
            offsetY,
            scale,
            rawW: videoRawW,
            rawH: videoRawH,
          };
        }
      }

      // Desenha bounding box a partir de [x, y, w, h] normalizado (0-1) relativo ao frame enviado
      function drawNormalizedBbox(bboxNorm, label = "") {
        const ctx = overlayCanvas.getContext("2d");
        ctx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);
        if (!bboxNorm || bboxNorm.length !== 4) return;
        const { offsetX, offsetY, scale, rawW, rawH } = currentVideoDimensions;
        if (!rawW || !rawH) return;

        // bboxNorm é [x, y, w, h] em coordenadas relativas ao frame enviado (0..1)
        const [xNorm, yNorm, wNorm, hNorm] = bboxNorm;
        // Mapeia para as coordenadas no vídeo original (rawW, rawH)
        const xRaw = xNorm * rawW;
        const yRaw = yNorm * rawH;
        const wRaw = wNorm * rawW;
        const hRaw = hNorm * rawH;

        // Aplica transformação de exibição (contain)
        const x1 = xRaw * scale + offsetX;
        const y1 = yRaw * scale + offsetY;
        const x2 = (xRaw + wRaw) * scale + offsetX;
        const y2 = (yRaw + hRaw) * scale + offsetY;

        ctx.save();
        ctx.strokeStyle = "#f97316";
        ctx.lineWidth = 3;
        ctx.shadowBlur = 0;
        ctx.strokeRect(x1, y1, x2 - x1, y2 - y1);
        if (label) {
          ctx.font = "bold 14px 'Segoe UI'";
          ctx.fillStyle = "#f97316";
          ctx.shadowColor = "black";
          ctx.fillText(label, x1 + 5, y1 - 5);
        }
        ctx.restore();
      }

      function getSpeciesDisplayName(species) {
        if (species === "cao") return "Cão";
        if (species === "gato") return "Gato";
        return species.charAt(0).toUpperCase() + species.slice(1);
      }

      function getRiskLevelClass(riskScore) {
        if (riskScore >= 0.7) return "critico";
        if (riskScore >= 0.4) return "atencao";
        return "normal";
      }

      function getRiskText(riskScore) {
        if (riskScore >= 0.7) return "Crítico";
        if (riskScore >= 0.4) return "Atenção";
        return "Normal";
      }

      function displayAnalysisFromBackend(data) {
        // O backend retorna: { animals: [ { species, bbox, riskScore, ... } ], processedAt }
        if (!data.animals || data.animals.length === 0) {
          analysisDiv.innerHTML = `<div class="risk-card-label">Última detecção</div><div class="risk-empty">Nenhum animal detectado.</div>`;
          drawNormalizedBbox(null);
          return;
        }

        const animal = data.animals[0];
        const species = animal.species || "indefinido";
        const riskScore = animal.riskScore ?? 0.5;
        const percent = (riskScore * 100).toFixed(1);
        const riskLevel = getRiskLevelClass(riskScore);
        const riskText = getRiskText(riskScore);
        const barColor =
          riskLevel === "critico"
            ? "#ef4444"
            : riskLevel === "atencao"
              ? "#eab308"
              : "#22c55e";

        const iconMap = {
          cão: "🐕",
          gato: "🐈",
          default: "🐾",
        };
        const speciesDisplay = getSpeciesDisplayName(species);
        const speciesIcon = iconMap[species.toLowerCase()] || iconMap.default;

        analysisDiv.innerHTML = `
          <div class="risk-card-label">Análise em tempo real</div>
          <div class="risk-species"><div class="species-icon">${speciesIcon}</div><div><div class="species-name">${speciesDisplay}</div><div class="species-sub">detectado</div></div></div>
          <div class="score-row"><span class="score-label">Índice de desconforto</span><span class="score-value">${percent}%</span></div>
          <div class="score-bar-track"><div class="score-bar-fill" style="width: ${percent}%; background: ${barColor};"></div></div>
          <div><span class="risk-badge ${riskLevel}">⚠️ ${riskText}</span></div>
        `;

        // Desenhar a bounding box se existir (formato [x, y, w, h] normalizado 0-1)
        if (animal.bbox && animal.bbox.length === 4) {
          // O backend retorna bbox em pixels relativos à imagem enviada. Precisamos normalizar.
          // O front-end conhece lastSentFrameSize (largura, altura do frame enviado).
          if (lastSentFrameSize.width > 0 && lastSentFrameSize.height > 0) {
            const [xPx, yPx, wPx, hPx] = animal.bbox;
            const normX = xPx / lastSentFrameSize.width;
            const normY = yPx / lastSentFrameSize.height;
            const normW = wPx / lastSentFrameSize.width;
            const normH = hPx / lastSentFrameSize.height;
            drawNormalizedBbox([normX, normY, normW, normH], `${speciesDisplay} • ${percent}%`);
          } else {
            // fallback: assumir que já está normalizado (caso backend mude)
            drawNormalizedBbox(animal.bbox, `${speciesDisplay} • ${percent}%`);
          }
        } else {
          drawNormalizedBbox(null);
        }
      }

      // Detecção de movimento simples (economia de envios)
      function detectMotion() {
        if (!videoElement.videoWidth || !videoElement.videoHeight) return true;
        const wRaw = videoElement.videoWidth;
        const hRaw = videoElement.videoHeight;
        const scale = Math.min(1, MAX_WIDTH / wRaw);
        const w = Math.floor(wRaw * scale);
        const h = Math.floor(hRaw * scale);
        if (motionCanvas.width !== w || motionCanvas.height !== h) {
          motionCanvas.width = w;
          motionCanvas.height = h;
        }
        motionCtx.drawImage(videoElement, 0, 0, w, h);
        const currentImg = motionCtx.getImageData(0, 0, w, h);
        if (
          !lastFrameData ||
          lastFrameData.width !== w ||
          lastFrameData.height !== h
        ) {
          lastFrameData = currentImg;
          return true;
        }
        const curr = currentImg.data;
        const prev = lastFrameData.data;
        let changed = 0;
        const totalPixels = w * h;
        for (let i = 0; i < curr.length; i += 4) {
          const lumCurr =
            0.299 * curr[i] + 0.587 * curr[i + 1] + 0.114 * curr[i + 2];
          const lumPrev =
            0.299 * prev[i] + 0.587 * prev[i + 1] + 0.114 * prev[i + 2];
          if (Math.abs(lumCurr - lumPrev) > MOTION_THRESHOLD) changed++;
        }
        lastFrameData = currentImg;
        return changed / totalPixels > MOTION_PIXEL_RATIO;
      }

      // Envia frame para o backend (sem qualquer simulação ou análise local)
      async function captureAndSend() {
        if (!activeVideoSource) return;
        if (!videoElement.videoWidth || !videoElement.videoHeight) return;
        const now = Date.now();
        const intervalMs =
          parseInt(intervalInput.value, 10) || DEFAULT_CAPTURE_INTERVAL;
        if (now - lastSentTimestamp < intervalMs) return;
        if (!detectMotion()) {
          updateStatus("Aguardando movimento...", "idle");
          return;
        }
        if (isSendingFrame) return;
        isSendingFrame = true;
        try {
          const tempCanvas = document.createElement("canvas");
          const ctx = tempCanvas.getContext("2d");
          const scale = Math.min(1, MAX_WIDTH / videoElement.videoWidth);
          const outW = Math.floor(videoElement.videoWidth * scale);
          const outH = Math.floor(videoElement.videoHeight * scale);
          tempCanvas.width = outW;
          tempCanvas.height = outH;
          ctx.drawImage(videoElement, 0, 0, outW, outH);
          lastSentFrameSize = { width: outW, height: outH };

          const blob = await new Promise((r) =>
            tempCanvas.toBlob(r, "image/jpeg", 0.7),
          );
          if (!blob) throw new Error("Falha ao criar blob");

          const formData = new FormData();
          formData.append("file", blob, "frame.jpg"); // campo correto: "file"

          updateStatus("Enviando frame para análise...", "loading");
          const response = await fetch(BACKEND_URL, {
            method: "POST",
            body: formData,
          });

          if (!response.ok) {
            const errorText = await response.text();
            throw new Error(`HTTP ${response.status}: ${errorText.slice(0, 100)}`);
          }

          const data = await response.json();
          updateStatus("Análise recebida do servidor", "active");
          displayAnalysisFromBackend(data);
          lastSentTimestamp = now;
        } catch (err) {
          console.error("Erro na comunicação com o backend:", err);
          updateStatus(`Erro: ${err.message} — verifique se o backend está rodando`, "error");
          drawNormalizedBbox(null);
          analysisDiv.innerHTML = `<div class="risk-card-label">Última detecção</div><div class="risk-empty">Erro de conexão com o servidor.</div>`;
        } finally {
          isSendingFrame = false;
        }
      }

      function stopAllMedia() {
        if (mediaStream) {
          mediaStream.getTracks().forEach((track) => track.stop());
          mediaStream = null;
        }
        if (currentVideoSrc) {
          URL.revokeObjectURL(currentVideoSrc);
          currentVideoSrc = null;
        }
        videoElement.pause();
        videoElement.srcObject = null;
        videoElement.src = "";
        videoElement.load();
        activeVideoSource = false;
        resetMotionBuffer();
        drawNormalizedBbox(null);
        showIdleOverlay(true);
        updateStatus("Parado. Inicie câmera ou carregue vídeo.", "idle");
        analysisDiv.innerHTML = `<div class="risk-card-label">Última detecção</div><div class="risk-empty">Nenhuma análise ainda.</div>`;
        lastSentFrameSize = { width: 0, height: 0 };
      }

      function startPeriodicAnalysis() {
        if (captureIntervalId) clearInterval(captureIntervalId);
        captureIntervalId = setInterval(() => {
          if (
            autoAnalysisActive &&
            activeVideoSource &&
            videoElement.readyState >= 2
          ) {
            captureAndSend();
          }
        }, 300);
      }

      async function startCamera() {
        stopAllMedia();
        try {
          const stream = await navigator.mediaDevices.getUserMedia({
            video: { width: { ideal: 1280 }, height: { ideal: 720 } },
          });
          mediaStream = stream;
          videoElement.srcObject = stream;
          await videoElement.play();
          activeVideoSource = true;
          showIdleOverlay(false);
          resetMotionBuffer();
          updateStatus("Câmera ativa - análise automática", "active");
          setTimeout(() => syncOverlaySize(), 100);
          videoElement.addEventListener("resize", syncOverlaySize);
          videoElement.addEventListener("loadedmetadata", syncOverlaySize);
          syncOverlaySize();
        } catch (err) {
          updateStatus("Erro ao acessar câmera: " + err.message, "error");
          activeVideoSource = false;
        }
      }

      function loadVideoFile(file) {
        if (!file) return;
        stopAllMedia();
        const url = URL.createObjectURL(file);
        currentVideoSrc = url;
        videoElement.src = url;
        videoElement.load();
        videoElement.onloadeddata = () => {
          videoElement.play().catch((e) => console.warn(e));
          activeVideoSource = true;
          showIdleOverlay(false);
          resetMotionBuffer();
          updateStatus("Vídeo carregado - análise ativa", "active");
          syncOverlaySize();
        };
        videoElement.onerror = () => {
          updateStatus("Erro ao carregar vídeo", "error");
          stopAllMedia();
        };
      }

      function toggleAutoAnalysis() {
        autoAnalysisActive = !autoAnalysisActive;
        toggleLabel.innerText = autoAnalysisActive
          ? "⏸️ Pausar análise"
          : "▶️ Retomar análise";
        updateStatus(
          autoAnalysisActive ? "Análise automática ativada" : "Análise pausada",
          autoAnalysisActive ? "active" : "idle",
        );
        if (!autoAnalysisActive) drawNormalizedBbox(null);
      }

      async function manualCapture() {
        if (!activeVideoSource) {
          updateStatus("Nenhuma fonte de vídeo ativa", "error");
          return;
        }
        if (isSendingFrame) return;
        const oldAuto = autoAnalysisActive;
        autoAnalysisActive = true;
        await captureAndSend();
        autoAnalysisActive = oldAuto;
      }

      // ---------- EVENTOS ----------
      startCameraBtn.addEventListener("click", startCamera);
      stopBtn.addEventListener("click", stopAllMedia);
      videoUpload.addEventListener("change", (e) => {
        if (e.target.files && e.target.files[0]) loadVideoFile(e.target.files[0]);
        e.target.value = null;
      });
      toggleAutoBtn.addEventListener("click", toggleAutoAnalysis);
      captureNowBtn.addEventListener("click", manualCapture);
      window.addEventListener("resize", () => {
        syncOverlaySize();
        drawNormalizedBbox(null);
      });
      videoElement.addEventListener("play", () => {
        syncOverlaySize();
        resetMotionBuffer();
      });

      const resizeObserver = new ResizeObserver(() => syncOverlaySize());
      resizeObserver.observe(document.getElementById("videoWrapper"));

      startPeriodicAnalysis();
      showIdleOverlay(true);
      updateStatus("Inicie a câmera ou carregue um vídeo", "idle");
    </script>
  </body>
</html>
